name: CI Demo

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  demo-job:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Check Node.js version
        run: node --version

      - name: Run demo command
        run: echo "CI is running successfully!"

      - name: Run app
        run: node src/app.js