name: CI Demo

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  demo-job:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run demo command
        shell: python
        run: print("CI is running successfully!")

      - name: Run calculator script
        run: python src/main.py